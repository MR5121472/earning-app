<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>Admin Panel</h2>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient("YOUR_URL","YOUR_KEY");

async function load(){
  const { data } = await supabase
    .from("withdraw_requests")
    .select("*")
    .eq("status","pending");

  let html = "";

  data.forEach(w=>{
    html += `
    <p>$${w.amount} - ${w.method} - ${w.account}
    <button onclick="approve('${w.id}')">Approve</button>
    <button onclick="reject('${w.id}')">Reject</button></p>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function approve(id){
  await supabase.from("withdraw_requests")
  .update({status:"approved"})
  .eq("id",id);
  load();
}

async function reject(id){
  await supabase.from("withdraw_requests")
  .update({status:"rejected"})
  .eq("id",id);
  load();
}

load();
</script>

</body>
</html>
